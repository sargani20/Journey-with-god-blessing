<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Journey with God Blessing</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --royal-blue: #001a33;
            --gold-glow: #ffd700;
            --gold-dark: #b8860b;
            --whatsapp-green: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--royal-blue); color: white; line-height: 1.6; overflow-x: hidden; }

        header {
            background: rgba(0, 26, 51, 0.98);
            padding: 20px 8%;
            border-bottom: 2px solid var(--gold-glow);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--gold-glow); text-decoration: none; }
        .back-btn { 
            color: white; text-decoration: none; font-size: 0.9rem; border: 1px solid var(--gold-glow); 
            padding: 8px 20px; border-radius: 5px; font-weight: 600; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        .back-btn:hover { background: var(--gold-glow); color: var(--royal-blue); }

        .contact-hero {
            padding: 80px 5%; text-align: center;
            background: linear-gradient(rgba(0,26,51,0.85), rgba(0,26,51,0.85)), url('https://images.unsplash.com/photo-1534536281715-e28d76689b4d?q=80&w=2070');
            background-size: cover; background-position: center;
        }
        .contact-hero h1 { font-family: 'Amiri', serif; font-size: 3rem; color: var(--gold-glow); }

        section { padding: 60px 8%; }
        .contact-container { display: grid; grid-template-columns: 1fr 1.5fr; gap: 50px; }

        .contact-info h2 { font-family: 'Amiri', serif; font-size: 2.5rem; color: var(--gold-glow); margin-bottom: 20px; }
        .info-item { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .info-item i { font-size: 1.5rem; color: var(--gold-glow); background: rgba(255,215,0,0.1); padding: 15px; border-radius: 50%; border: 1px solid var(--gold-dark); }
        .info-item div h4 { color: var(--gold-glow); margin-bottom: 5px; }

        .contact-form { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,215,0,0.2); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--gold-glow); font-size: 0.9rem; }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dark); 
            border-radius: 8px; color: white; outline: none; transition: 0.3s;
        }
        
        .submit-btn { 
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-glow)); 
            color: var(--royal-blue); width: 100%; padding: 15px; border: none; 
            border-radius: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        /* NEW WHATSAPP BUTTON SECTION */
        .whatsapp-section {
            margin-top: 50px;
            text-align: center;
            background: rgba(255,255,255,0.03);
            padding: 50px;
            border-radius: 20px;
            border: 2px dashed var(--gold-dark);
        }
        .whatsapp-section h3 { font-family: 'Amiri', serif; font-size: 2rem; color: var(--gold-glow); margin-bottom: 20px; }
        
        .chat-whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background-color: var(--whatsapp-green);
            color: white;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }
        .chat-whatsapp-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.5);
            background-color: #1ebe57;
        }
        .chat-whatsapp-btn i { font-size: 1.8rem; }

        footer { text-align: center; padding: 40px; border-top: 1px solid var(--gold-dark); margin-top: 50px; color: #aaa; }

        @media (max-width: 992px) {
            .contact-container { grid-template-columns: 1fr; }
            header { padding: 15px 5%; flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">JOURNEY WITH <span>GOD BLESSING</span></a>
        <a href="index.html" class="back-btn"><i class="fas fa-home"></i> Home</a>
    </header>

    <div class="contact-hero">
        <h1>Raabta Karein</h1>
        <p>Humse fori rabte ke liye WhatsApp ka istemal karein.</p>
    </div>

    <section>
        <div class="contact-container">
            <div class="contact-info">
                <h2>Contact Details</h2>
                <div class="info-item">
                    <i class="fas fa-phone-alt"></i>
                    <div>
                        <h4>Mobile Number</h4>
                        <p>+92 344 1810567</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <p>info@journeywithgod.com</p>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <form action="#">
                    <div class="form-group">
                        <label>Naam</label>
                        <input type="text" placeholder="Apna naam likhein..." required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="4" placeholder="Aap kya puchna chahte hain?"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>

        <!-- NEW WHATSAPP BUTTON REPLACING THE MAP -->
        <div class="whatsapp-section">
            <h3>Quick Inquiry</h3>
            <p style="margin-bottom: 25px;">Sawal ya booking ke liye hamare official WhatsApp par click karein:</p>
            <a href="https://wa.me/923441810567" target="_blank" class="chat-whatsapp-btn">
                <i class="fab fa-whatsapp"></i> Chat with WhatsApp
            </a>
        </div>
    </section>

</body>
</html>
